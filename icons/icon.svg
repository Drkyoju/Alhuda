    <line x1="140" y1="210" x2="232" y2="216"/>
    <line x1="140" y1="248" x2="232" y2="254"/>
    <line x1="140" y1="286" x2="232" y2="292"/>
    <line x1="280" y1="216" x2="372" y2="210"/>
    <line x1="280" y1="254" x2="372" y2="248"/>
    <line x1="280" y1="292" x2="372" y2="286"/>
  </g>
  <!-- Crescent (top-right, decorative Islamic motif) -->
  <circle cx="380" cy="130" r="36" fill="#e8d5a3"/>
  <circle cx="394" cy="120" r="32" fill="#1b8a6b"/>
