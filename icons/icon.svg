      <stop offset="0%" stop-color="#163828"/>
      <stop offset="100%" stop-color="#1b8a6b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open book (gold), centered -->
